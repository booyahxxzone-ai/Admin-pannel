<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BZ | MASTER CONTROL PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00ffcc; --bg: #050810; --card: #161c2d; --accent: #f59e0b; --red: #ff4d4d; --green: #10b981; --blue: #38b6ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 90px; }
        .header { padding: 20px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header h1 { font-family: 'Orbitron'; font-size: 16px; color: var(--primary); }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        
        /* User Row Styling */
        .user-row { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .u-info b { display: block; font-size: 14px; color: var(--primary); }
        .u-info span { font-size: 11px; color: #94a3b8; }
        .u-bal { font-weight: 800; color: var(--accent); font-size: 15px; }

        .action-card { background: #1e2536; border-radius: 18px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ac-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; font-weight: 600; }
        .ac-body { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 12px; font-size: 13px; border: 1px solid rgba(255,255,255,0.05); }
        
        input { background: #1e293b; border: 1px solid #334155; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 8px; font-size: 13px; }
        .btn { border: none; border-radius: 8px; padding: 10px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-pay { background: var(--green); color: #000; flex: 1; }
        .btn-rej { background: var(--red); color: #fff; flex: 1; }
        .btn-edit { background: var(--blue); color: #fff; padding: 5px 10px; font-size: 10px; border-radius: 5px; margin-top: 5px;}

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,255,204,0.2); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; text-decoration: none; cursor: pointer;}
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary); }
        .tab-content { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BZ MASTER <span style="color:white">PRO</span></h1>
        <div id="stats" style="font-size: 10px; color: var(--primary);">Loading System...</div>
    </div>

    <div class="container">
        <div id="tab-users" class="tab-content" style="display:block;">
            <input type="text" id="userSearch" placeholder="Search by Phone or Name..." onkeyup="searchUsers()">
            <div id="allUsersList"></div>
        </div>

        <div id="tab-payments" class="tab-content">
            <h2 style="font-size:12px; color:var(--primary); margin-bottom:15px; font-family:'Orbitron';">📥 DEPOSIT REQUESTS</h2>
            <div id="depositList"></div>
            
            <h2 style="font-size:12px; color:var(--red); margin:30px 0 15px; font-family:'Orbitron';">📤 WITHDRAWAL REQUESTS</h2>
            <div id="withdrawList"></div>
        </div>
    </div>

    <div id="editModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:5000; padding:20px;">
        <div style="background:var(--card); padding:25px; border-radius:20px; width:100%; max-width:350px; border:1px solid var(--primary);">
            <h3 id="mUserPhone" style="color:var(--primary); font-size:14px; margin-bottom:15px;">Phone: ---</h3>
            <input type="text" id="mUserName" placeholder="Name">
            <input type="number" id="mUserBal" placeholder="Balance">
            <button class="btn btn-pay" style="width:100%; margin-top:10px;" onclick="saveUserEdit()">SAVE CHANGES</button>
            <button class="btn" style="width:100%; margin-top:8px; background:grey; color:white;" onclick="document.getElementById('editModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab('tab-users', this)"><i class="fas fa-users"></i>USERS</div>
        <div class="nav-item" onclick="showTab('tab-payments', this)"><i class="fas fa-wallet"></i>PAYMENTS</div>
    </nav>

    <script>
        const fbConfig = { databaseURL: "https://earn-money-6891a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        const botToken = "8491369948:AAH_EBchjJgwlNrWA6noqj8zNXsItuk20-o";
        const chatId = "7852788120";

        let allUsersData = {};

        // Notification Sender Function
        async function pushNotification(phone, title, message, type) {
            const newNotif = {
                title: title,
                message: message,
                time: new Date().toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }),
                type: type // 'money', 'reject', 'match'
            };
            await db.ref('user_notifications/' + phone).push(newNotif);
        }

        async function sendTelegram(msg) {
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=HTML`;
            fetch(url);
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }

        // --- USER MANAGEMENT ---
        db.ref('users').on('value', snap => {
            allUsersData = snap.val() || {};
            renderUsers(allUsersData);
            document.getElementById('stats').innerText = `TOTAL USERS: ${Object.keys(allUsersData).length}`;
        });

        function renderUsers(users) {
            const list = document.getElementById('allUsersList');
            list.innerHTML = "";
            Object.keys(users).forEach(phone => {
                const u = users[phone];
                const isBanned = u.isBanned || false;
                list.innerHTML += `
                    <div class="user-row" style="${isBanned ? 'opacity:0.6; border-color:var(--red);' : ''}">
                        <div class="u-info">
                            <b>${u.name || 'User'} ${isBanned ? '🚫' : ''}</b>
                            <span>${phone} | Bal: ₹${u.balance || 0}</span>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-edit" onclick="openEdit('${phone}', '${u.name}', ${u.balance})">EDIT</button>
                            <button class="btn-edit" style="background:${isBanned ? 'var(--green)':'var(--red)'}" 
                                onclick="handleBan('${phone}', ${isBanned})">${isBanned ? 'UNBAN':'BAN'}</button>
                        </div>
                    </div>`;
            });
        }

        async function handleBan(phone, currentStatus) {
            if(!currentStatus) {
                if(confirm("Confirm Ban? This will block user and clear sensitive data history.")){
                    await db.ref('users/'+phone).update({ isBanned: true });
                    // Clear history but keep basic info for blocking
                    await db.ref('deposits').orderByChild('userPhone').equalTo(phone).ref.remove(); 
                    await db.ref('withdrawals').orderByChild('userPhone').equalTo(phone).ref.remove();
                    alert("User Banned & Data Wiped");
                }
            } else {
                await db.ref('users/'+phone).update({ isBanned: false });
                alert("User Unbanned");
            }
        }

        function openEdit(phone, name, bal) {
            document.getElementById('mUserPhone').innerText = "Phone: " + phone;
            document.getElementById('mUserName').value = name;
            document.getElementById('mUserBal').value = bal;
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveUserEdit() {
            const phone = document.getElementById('mUserPhone').innerText.replace("Phone: ", "");
            const name = document.getElementById('mUserName').value;
            const bal = Number(document.getElementById('mUserBal').value);
            await db.ref('users/'+phone).update({ name: name, balance: bal });
            document.getElementById('editModal').style.display='none';
        }

        // --- DEPOSITS ---
        db.ref('deposits').on('value', snap => {
            const list = document.getElementById('depositList'); list.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                if(d.status === 'pending') {
                    list.innerHTML += `
                    <div class="action-card">
                        <div class="ac-header"><span>DEPOSIT REQUEST</span><span style="color:var(--accent)">₹${d.amount}</span></div>
                        <div class="ac-body"><b>Phone:</b> ${d.userPhone}<br><b>UTR:</b> ${d.utr}</div>
                        <div class="ac-footer">
                            <button class="btn btn-pay" onclick="approveDeposit('${child.key}','${d.userPhone}',${d.amount})">APPROVE</button>
                            <button class="btn btn-rej" onclick="rejectDeposit('${child.key}','${d.userPhone}')">REJECT</button>
                        </div>
                    </div>`;
                }
            });
        });

        async function approveDeposit(id, phone, amt) {
            const uSnap = await db.ref('users/'+phone).once('value');
            if(uSnap.exists()){
                let newBal = (Number(uSnap.val().balance) || 0) + Number(amt);
                await db.ref('users/'+phone).update({ balance: newBal });
                await db.ref('deposits/'+id).update({ status: 'approved' });
                await pushNotification(phone, "Deposit Approved! ✅", `₹${amt} added to your wallet. Enjoy gaming!`, "money");
                sendTelegram(`✅ DEPOSIT APPROVED: ₹${amt} to ${phone}`);
            }
        }

        async function rejectDeposit(id, phone) {
            await db.ref('deposits/'+id).update({ status: 'rejected' });
            await pushNotification(phone, "Deposit Rejected! ❌", "Your deposit request was rejected. Check UTR or contact support.", "reject");
            alert("Deposit Rejected");
        }

        // --- WITHDRAWALS ---
        db.ref('withdrawals').on('value', snap => {
            const list = document.getElementById('withdrawList'); list.innerHTML = "";
            snap.forEach(child => {
                const w = child.val();
                if(w.status === 'pending') {
                    list.innerHTML += `
                    <div class="action-card" style="border-left-color:var(--red)">
                        <div class="ac-header"><span>WITHDRAW REQUEST</span><span style="color:var(--red)">₹${w.amount}</span></div>
                        <div class="ac-body"><b>Phone:</b> ${w.userPhone}<br><b>UPI:</b> ${w.upiID}</div>
                        <div class="ac-footer">
                            <button class="btn btn-pay" style="background:var(--blue); color:white" onclick="approveWithdraw('${child.key}','${w.userPhone}',${w.amount})">MARK PAID</button>
                            <button class="btn btn-rej" onclick="rejectWithdraw('${child.key}','${w.userPhone}',${w.amount})">REJECT/REFUND</button>
                        </div>
                    </div>`;
                }
            });
        });

        async function approveWithdraw(id, phone, amt) {
            await db.ref('withdrawals/'+id).update({ status: 'approved' });
            await pushNotification(phone, "Withdrawal Success! 💸", `₹${amt} has been sent to your UPI ID.`, "money");
            sendTelegram(`💸 WITHDRAWAL PAID: ₹${amt} to ${phone}`);
        }

        async function rejectWithdraw(id, phone, amt) {
            const uSnap = await db.ref('users/'+phone).once('value');
            if(uSnap.exists()){
                let refBal = (Number(uSnap.val().balance) || 0) + Number(amt);
                await db.ref('users/'+phone).update({ balance: refBal });
                await db.ref('withdrawals/'+id).update({ status: 'rejected' });
                await pushNotification(phone, "Withdrawal Refunded! 🔄", `Request rejected. ₹${amt} refunded to wallet.`, "reject");
            }
        }

        function searchUsers() {
            let q = document.getElementById('userSearch').value.toLowerCase();
            let filtered = {};
            Object.keys(allUsersData).forEach(p => {
                if(p.includes(q) || (allUsersData[p].name && allUsersData[p].name.toLowerCase().includes(q))) filtered[p] = allUsersData[p];
            });
            renderUsers(filtered);
        }
    </script>
</body>
</html>
