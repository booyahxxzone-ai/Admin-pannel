<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BZ | ELITE ADMIN SMART</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #00ffcc; --bg: #0b0f1a; --card: #161c2d; --text: #ffffff; 
            --accent: #ff9f43; --red: #ff4d4d; --blue: #38b6ff; --green: #00c853;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* Header */
        .header { 
            padding: 20px; text-align: center; background: var(--card); 
            border-bottom: 2px solid var(--primary); display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .header h1 { font-family: 'Orbitron'; font-size: 15px; color: var(--primary); letter-spacing: 1px; }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        /* Card Design */
        .card { 
            background: var(--card); border-radius: 20px; padding: 22px; 
            margin-bottom: 20px; border: 1px solid rgba(0,255,204,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { font-family: 'Orbitron'; font-size: 13px; color: var(--accent); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* Inputs */
        input, select { 
            background: #1e2536; border: 1px solid #334155; color: #fff; 
            padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-size: 13px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        /* Buttons */
        .btn { 
            border: none; border-radius: 12px; font-family: 'Orbitron'; 
            cursor: pointer; font-weight: 900; padding: 15px; transition: 0.3s; 
            font-size: 11px; text-transform: uppercase;
        }
        .btn-main { background: var(--primary); color: #000; width: 100%; box-shadow: 0 5px 15px rgba(0,255,204,0.2); }
        .btn-sm { padding: 8px 12px; font-size: 9px; color: #fff; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }

        /* Filter */
        .cat-filter { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 15px; scrollbar-width: none; }
        .cat-btn { 
            padding: 10px 20px; background: #1e2536; border-radius: 50px; 
            font-size: 10px; font-weight: 800; white-space: nowrap; border: 1px solid #334155; color: #94a3b8; transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Match Row */
        .match-row {
            background: #1e2536; border-radius: 18px; padding: 18px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .match-info b { font-size: 15px; display: block; color: var(--primary); margin-bottom: 4px; }
        .match-info small { color: #94a3b8; font-size: 11px; display: block; margin-bottom: 8px; }
        .status-tag { font-size: 9px; padding: 4px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 420px; border: 1px solid rgba(0,255,204,0.3); box-shadow: 0 0 40px rgba(0,0,0,1); }

        /* Player Cards in Modal */
        .p-card { background: #1e2536; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .p-card p { font-size: 12px; color: #cbd5e1; }
        .p-card b { color: var(--primary); }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: var(--card); display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid rgba(0,255,204,0.2); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #64748b; font-size: 9px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 22px; margin-bottom: 6px; display: block; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px rgba(0,255,204,0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h1>BZ ADMIN <span style="color:white">ELITE</span></h1>
        <button class="btn btn-sm" style="background:var(--accent); color:#000;" onclick="location.href='admin2.html'">WALLET ➔</button>
    </div>

    <div class="container">
        <div id="tab-add" class="tab-content">
            <div class="card">
                <h2>CREATE NEW BATTLE</h2>
                <input type="text" id="mTitle" placeholder="Enter Match Title...">
                <select id="mMode">
                    <option value="1V1">1V1 SOLO</option>
                    <option value="2V2">2V2 DUO</option>
                    <option value="4V4">4V4 SQUAD</option>
                </select>
                <input type="number" id="mEntry" placeholder="Entry Fee (₹)">
                <input type="number" id="mPrize" placeholder="Win Prize Pool (₹)">
                <input type="datetime-local" id="mTime">
                <button class="btn btn-main" onclick="publishMatch()">PUBLISH & SEND NOTIF</button>
            </div>
        </div>

        <div id="tab-matches" class="tab-content" style="display:none;">
            <div class="cat-filter">
                <div class="cat-btn active" onclick="filterBy('all', this)">ALL</div>
                <div class="cat-btn" onclick="filterBy('matches_1v1', this)">1V1</div>
                <div class="cat-btn" onclick="filterBy('matches_2v2', this)">2V2</div>
                <div class="cat-btn" onclick="filterBy('matches_4v4', this)">4V4</div>
            </div>
            <div id="matchListContainer">
                <p style="text-align:center; padding:20px; color:#64748b;">No battles loaded.</p>
            </div>
        </div>
    </div>

    <div class="modal" id="controlModal">
        <div class="modal-box">
            <h2 id="controlTitle">MATCH ACTION</h2>
            <div id="liveInputs">
                <input type="text" id="roomId" placeholder="Enter Room ID">
                <input type="text" id="roomPass" placeholder="Enter Room Password">
                <button class="btn btn-main" style="background:var(--red); color:#fff;" onclick="confirmLive()">SET LIVE 🔴</button>
            </div>
            <div id="finishInputs" style="display:none;">
                <input type="text" id="winName" placeholder="Winner Name / Team Name">
                <button class="btn btn-main" style="background:var(--green); color:#fff;" onclick="confirmFinish()">COMPLETE BATTLE 🏆</button>
            </div>
            <button class="btn btn-sm" style="background:transparent; width:100%; margin-top:15px; color:#94a3b8;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-box" style="max-height: 80vh; overflow-y: auto;">
            <h2 id="pTitle">JOINED PLAYERS</h2>
            <div id="playerList"></div>
            <button class="btn btn-main" style="margin-top:15px;" onclick="closeModal()">CLOSE PANEL</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab('tab-add', this)"><i class="fas fa-plus-circle"></i>CREATE</div>
        <div class="nav-item" onclick="showTab('tab-matches', this)"><i class="fas fa-tasks"></i>MANAGE</div>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://earn-money-6891a-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let activeMID = "", activePath = "", activeTitle = "", currentFilter = "all";

        // Push Notifications to ALL registered users
        function sendNotificationToAll(title, msg, type) {
            db.ref('users').once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((user) => {
                        const userPhone = user.key;
                        db.ref('user_notifications/' + userPhone).push({
                            title: title,
                            message: msg,
                            type: type,
                            time: new Date().toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
                        });
                    });
                }
            });
        }

        // Tab System
        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
            if(id === 'tab-matches') loadMatches();
        }

        // Publish New Match
        async function publishMatch() {
            const title = document.getElementById('mTitle').value;
            const mode = document.getElementById('mMode').value;
            const entry = document.getElementById('mEntry').value;
            const prize = document.getElementById('mPrize').value;
            const time = document.getElementById('mTime').value;
            const mid = "M" + Date.now();
            let path = mode === '1V1' ? 'matches_1v1' : (mode === '2V2' ? 'matches_2v2' : 'matches_4v4');

            if(!title || !entry || !time) return alert("Bhai fields fill kar!");

            const data = { mId: mid, title, mode, entry, prize, time, status: "upcoming" };
            
            try {
                await db.ref(`${path}/${mid}`).set(data);
                sendNotificationToAll("New Battle Added! 🎮", `${title} (${mode}) join now at ₹${entry}!`, "match");
                alert("Match Created & Users Notified!");
                document.getElementById('mTitle').value = "";
                showTab('tab-matches', document.querySelectorAll('.nav-item')[1]);
            } catch (e) { alert("Error: " + e.message); }
        }

        // Load and Render Matches
        async function loadMatches() {
            const container = document.getElementById('matchListContainer');
            container.innerHTML = "<p style='text-align:center; padding:20px; color:var(--primary);'>Fetching Battles...</p>";
            
            const paths = ['matches_1v1', 'matches_2v2', 'matches_4v4'];
            let html = "";

            for(let p of paths) {
                if(currentFilter !== 'all' && currentFilter !== p) continue;
                const snap = await db.ref(p).once('value');
                snap.forEach(child => {
                    const m = child.val();
                    const pCount = m.players ? Object.keys(m.players).length : 0;
                    html += `
                        <div class="match-row">
                            <div class="match-info">
                                <b>${m.title}</b>
                                <small>${m.mode} | ${m.time}</small>
                                <span class="status-tag" style="background:${m.status=='live'?'var(--red)':(m.status=='finished'?'var(--blue)':'#334155')}">
                                    ${m.status}
                                </span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:6px;">
                                <button class="btn-sm" style="background:var(--blue)" onclick="viewPlayers('${p}', '${m.mId}', '${m.mode}')">PLAYERS (${pCount})</button>
                                ${m.status=='upcoming' ? `<button class="btn-sm" style="background:var(--green)" onclick="openControl('${p}', '${m.mId}', 'live', '${m.title}')">GO LIVE</button>` : ''}
                                ${m.status=='live' ? `<button class="btn-sm" style="background:var(--accent); color:#000" onclick="openControl('${p}', '${m.mId}', 'finish', '${m.title}')">FINISH</button>` : ''}
                                <button class="btn-sm" style="background:var(--red)" onclick="deleteMatch('${p}', '${m.mId}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            }
            container.innerHTML = html || "<p style='text-align:center; padding:30px; color:#64748b;'>No matches found.</p>";
        }

        // View Players Logic
        function viewPlayers(path, mid, mode) {
            db.ref(`${path}/${mid}/players`).once('value', snap => {
                const list = document.getElementById('playerList');
                list.innerHTML = "";
                if(!snap.exists()) list.innerHTML = "<p style='text-align:center; color:#64748b;'>Zero joinings.</p>";
                
                snap.forEach(p => {
                    const v = p.val();
                    let content = mode === '1V1' ? `<p>Name: <b>${v.name}</b></p><p>UID: <b>${v.uid}</b></p>` : `<p>Leader: <b>${v.leader_name || v.name}</b></p><p>Team UIDs: <b>${v.uid1}, ${v.uid2}...</b></p>`;
                    list.innerHTML += `<div class="p-card">${content}</div>`;
                });
                document.getElementById('playerModal').style.display = 'flex';
            });
        }

        // Match Actions (Live/Finish)
        function openControl(path, id, type, title) {
            activeMID = id; activePath = path; activeTitle = title;
            document.getElementById('controlModal').style.display = 'flex';
            document.getElementById('liveInputs').style.display = type === 'live' ? 'block' : 'none';
            document.getElementById('finishInputs').style.display = type === 'finish' ? 'block' : 'none';
        }

        async function confirmLive() {
            const rid = document.getElementById('roomId').value;
            const rps = document.getElementById('roomPass').value;
            if(!rid || !rps) return alert("Room ID/Pass missing!");
            
            await db.ref(`${activePath}/${activeMID}`).update({ roomId: rid, roomPass: rps, status: 'live' });
            sendNotificationToAll("Room Ready! 🔴", `Room Details updated for ${activeTitle}. Join now!`, "live");
            closeModal(); loadMatches();
        }

        async function confirmFinish() {
            const winner = document.getElementById('winName').value;
            if(!winner) return alert("Winner name?");
            
            await db.ref(`${activePath}/${activeMID}`).update({ status: 'finished', winner_name: winner });
            sendNotificationToAll("Winner Winner! 🏆", `${winner} won the ${activeTitle}! Congrats!`, "finish");
            closeModal(); loadMatches();
        }

        function deleteMatch(path, mid) {
            if(confirm("Bhai delete karun? Refund ka dhyan rakhna!")) {
                db.ref(`${path}/${mid}`).remove(); loadMatches();
            }
        }

        function filterBy(cat, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active'); currentFilter = cat; loadMatches();
        }

        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
